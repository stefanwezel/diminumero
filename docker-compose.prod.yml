version: '3.8'

services:
  app:
    container_name: diminumero-prod
    build:
      context: .
      args:
        MODE: production
    ports:
      - "5005:5005"
    environment:
      - FLASK_ENV=production
    env_file:
      - .env
    volumes:
      # SQLite DB lives in Flask's instance folder; bind-mount to ./data/
      # so it survives container rebuilds. Back up with: tar czf backup-$(date +%F).tgz data/
      - ./data:/app/instance
    restart: unless-stopped